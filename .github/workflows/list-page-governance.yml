name: list-page-governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  list-page-governance:
    name: list-page-governance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Check list page governance
        env:
          GOVERNANCE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: npm run check:list-page-governance
      - name: Verify supplement management template
        run: npm run test:supplement-management-list-template:e2e
      - name: Verify production preparation timing
        run: npm run test:production-preparation-timing:e2e
      - name: Build
        run: npm run build
